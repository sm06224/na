name: test

# 作品のうちロジックを持つもの（genesis の人工生命コア）を
# ヘッドレスで検証する。ブラウザ不要、依存ゼロ、Node 標準のテストランナー。
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  genesis:
    name: genesis — artificial life core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run the universe in a test tube
        working-directory: works/genesis
        run: node --test tests/*.test.js

  shi:
    name: shi — civilization core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run eight centuries of history headless
        working-directory: works/shi
        run: node --test tests/*.test.js

  ban:
    name: ban — shift scheduler core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Solve a month of rosters headless
        working-directory: works/ban
        run: node --test tests/*.test.js

  koto:
    name: koto — emergent language core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Grow a language from nothing, headless
        working-directory: works/koto
        run: node --test tests/*.test.js

  uta:
    name: uta — emergent music core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Let six centuries of songs be sung, headless
        working-directory: works/uta
        run: node --test tests/*.test.js

  hotaru:
    name: 蛍 — do the fireflies still glow?
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 蛍にテストの檻は似合わない。光るかどうかだけ、そっと確かめる。
      - name: Three frames of June night
        run: HOTARU_ITSUDEMO=1 HOTARU_FRAMES=3 ./蛍 > /dev/null
