# gitleaks 設定 — デフォルトのルール群をそのまま使う。
# このリポジトリは依存ゼロの作品集で、ソースに鍵を持たない。
# 将来 HTML/JS にうっかり秘密が混ざっても捕まえられるよう、
# ソースファイルを除外しない（＝番人を弱めない）。
[extend]
useDefault = true

[allowlist]
description = "誤検知になりうる擬似トークンだけを無視する"
regexes = [
  '''EXAMPLE''',
  '''placeholder''',
  # 狐 (kitsune) の合言葉の字母 — 紛らわしい字を抜いた人が読める集合で、鍵ではない。
  # 高エントロピーゆえ汎用APIキーに誤認されるので、この既知の並びだけを見逃す。
  '''ABCDEFGHJKMNPQRSTUVWXYZ23456789''',
]
