<!DOCTYPE html>
<html lang="ja">
<head>

<style>
:root { color-scheme: dark;
  --bg: #0b0e14; --bg2: #0c1119; --line: #1c2230; --line2: #2a3344;
  --fg: #e7ebf4; --dim: #8a93a6; --acc: #6aa9ff;
  --kw: #7aa2ff; --id: #7ad1b0; --tag: #f5b86a; --date: #d68ad6; --arrow: #9aa3b5; --str: #cbd3e6; --com: #5a6b86; --bad: #f5667a; }
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { display: flex; flex-direction: column; background: var(--bg); color: var(--fg); overflow: hidden;
  font-family: ui-sans-serif, system-ui, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; -webkit-text-size-adjust: 100%; }

header { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap;
  padding: calc(.45rem + env(safe-area-inset-top)) .8rem .45rem; border-bottom: 1px solid var(--line); background: var(--bg2); }
.brand { font-weight: 700; letter-spacing: .03em; }
.badge { font-size: .64rem; letter-spacing: .12em; text-transform: uppercase; color: var(--acc);
  border: 1px solid var(--line2); border-radius: 999px; padding: .12em .7em; }
.pick { font-size: .72rem; color: var(--dim); display: flex; align-items: center; gap: .4rem; }
select, button { font: inherit; color: var(--fg); background: #18202e; border: 1px solid var(--line2); border-radius: 7px;
  padding: .32em .8em; font-size: .76rem; cursor: pointer; transition: background .15s, border-color .15s; touch-action: manipulation; }
select:hover, button:hover { background: #20293a; border-color: #3a4660; }
.sp { flex: 1; }
.ins { display: flex; gap: .35rem; flex-wrap: wrap; }
.ins button { padding: .3em .6em; font-size: .72rem; }
.status { font-size: .72rem; color: var(--dim); }
.status[data-bad="1"] { color: var(--tag); }
.menu { position: relative; }
.dropdown { position: absolute; right: 0; top: 110%; background: #131a26; border: 1px solid var(--line2); border-radius: 9px;
  padding: .3rem; display: flex; flex-direction: column; gap: .2rem; z-index: 30; min-width: 160px; box-shadow: 0 12px 30px rgba(0,0,0,.4); }
.dropdown button { text-align: left; background: transparent; border: 0; }
.dropdown button:hover { background: #20293a; }

main { flex: 1; display: flex; min-height: 0; }
.editor { width: 44%; min-width: 280px; display: flex; flex-direction: column; border-right: 1px solid var(--line); background: var(--bg2); min-height: 0; }
.codewrap { flex: 1; display: flex; min-height: 0; overflow: hidden; }
.gutter { width: 42px; flex: none; overflow: hidden; text-align: right; padding: 12px 8px 12px 0; color: #4a5670;
  font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; line-height: 20px; user-select: none; background: #0a0e16; }
.gutter .ln { height: 20px; }
.gutter .ln.bad { color: var(--bad); font-weight: 700; }
.code { position: relative; flex: 1; min-width: 0; overflow: hidden; }
.hl, #src { margin: 0; border: 0; padding: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 13px; line-height: 20px; tab-size: 2; white-space: pre; overflow: auto; }
.hl { position: absolute; inset: 0; pointer-events: none; color: var(--str); }
#src { position: absolute; inset: 0; width: 100%; height: 100%; resize: none; background: transparent; color: transparent;
  caret-color: var(--fg); outline: none; }
#src::selection { background: rgba(106,169,255,.28); }
.tk-kw { color: var(--kw); } .tk-id { color: var(--id); } .tk-tag { color: var(--tag); }
.tk-date { color: var(--date); } .tk-arrow { color: var(--arrow); } .tk-com { color: var(--com); font-style: italic; }
.tk-shape { color: var(--str); } .tk-bad { text-decoration: wavy underline var(--bad); }

.problems { flex: none; max-height: 30%; overflow: auto; border-top: 1px solid var(--line); padding: .3rem 0; }
.problems:empty { display: none; }
.problems .p { display: flex; gap: .5rem; padding: .25rem .8rem; font-size: .74rem; color: #d8b48a; cursor: pointer; }
.problems .p:hover { background: #161d2a; }
.problems .p .ln { color: var(--bad); font-variant-numeric: tabular-nums; }

.view { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.stage { flex: 1; overflow: hidden; touch-action: none; cursor: grab;
  background: radial-gradient(120% 100% at 30% 0%, #0f1420, #0b0e14);
  background-image: radial-gradient(120% 100% at 30% 0%, #0f1420, #0b0e14),
    linear-gradient(#ffffff09 1px, transparent 1px), linear-gradient(90deg, #ffffff09 1px, transparent 1px);
  background-size: 100% 100%, 22px 22px, 22px 22px; }
.stage.panning { cursor: grabbing; }
#canvas { transform-origin: 0 0; will-change: transform; }
#canvas svg { display: block; }
#canvas [data-drag] { cursor: grab; }
.zoombar { position: absolute; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom)); display: flex; gap: .3rem; align-items: center;
  background: #131a26cc; border: 1px solid var(--line2); border-radius: 10px; padding: .25rem .4rem; backdrop-filter: blur(6px); }
.zoombar button { padding: .2em .6em; }
#zLabel { font-size: .72rem; color: var(--dim); min-width: 3em; text-align: center; font-variant-numeric: tabular-nums; }
.only-mobile { display: none; }

.ac { position: fixed; z-index: 40; background: #131a26; border: 1px solid var(--line2); border-radius: 8px;
  padding: .2rem; max-height: 220px; overflow: auto; box-shadow: 0 14px 34px rgba(0,0,0,.5); min-width: 160px; }
.ac .opt { padding: .3em .6em; font-size: .78rem; border-radius: 5px; cursor: pointer; display: flex; gap: .5rem; align-items: baseline; }
.ac .opt .k { font-family: ui-monospace, Menlo, monospace; color: var(--id); }
.ac .opt .d { color: var(--dim); font-size: .68rem; }
.ac .opt.sel { background: #24304a; }

#toast { position: fixed; left: 50%; bottom: calc(22px + env(safe-area-inset-bottom)); transform: translateX(-50%);
  background: #18202e; border: 1px solid var(--line2); padding: .5em 1.1em; border-radius: 999px; font-size: .76rem;
  opacity: 0; transition: opacity .35s; pointer-events: none; z-index: 50; }
#toast.on { opacity: 1; }

@media (max-width: 820px) {
  header { gap: .4rem; }
  .pick, .ins { display: none; }
  main { flex-direction: column; }
  .editor { width: 100%; height: 50%; border-right: 0; border-bottom: 1px solid var(--line); }
  .view { flex: 1; }
  .only-mobile { display: inline-block; }
  body.viewmax .editor { display: none; }
  body.viewmax .view { height: 100%; }
}

<div id="ac" class="ac" hidden></div>
<div id="toast" hidden></div>

<script>
window.STUDIO_SOURCE="flowchart TD\n    web[Web フロント] --> gw(API ゲートウェイ)\n    mobile([モバイル]) --> gw\n    gw -->|認証| auth{認証OK?}\n    gw --> order[注文サービス]\n    gw --> cat[カタログ]\n    order --> pay[決済サービス]\n    order --> db[(主データベース)]\n    cat --> cache((キャッシュ))\n    auth --> db\n    subgraph クライアント\n      web\n      mobile\n    end\n    subgraph データ基盤\n      db\n      cache\n    end\n";
/* ============================================================
   日付のちいさな道具 — 依存ゼロ、UTC 固定で時差の罠を避ける。
   ガントは「日」を単位に動く。ここはその物差し。
   ============================================================ */

// "2026-07-01"（または "2026/07/01"）→ UTC ミリ秒（不正なら null）。
function toMs(s) {
  const m = /^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/.exec(String(s).trim());
  if (!m) return null;
  const y = +m[1], mo = +m[2], d = +m[3];
  if (mo < 1 || mo > 12 || d < 1 || d > 31) return null;
  return Date.UTC(y, mo - 1, d);
}

// 日付らしい文字列か（Mermaid のフィールド判定に使う）。
function isDate(s) { return toMs(s) != null; }

const DAY = 86400000;

// 2 つの日付の差（日数, b - a）。
function diffDays(a, b) {
  const ma = toMs(a), mb = toMs(b);
  if (ma == null || mb == null) return null;
  return Math.round((mb - ma) / DAY);
}

// 日付に n 日足す → "YYYY-MM-DD"。
function addDays(s, n) {
  const ms = toMs(s);
  if (ms == null) return null;
  const d = new Date(ms + n * DAY);
  const p = (x) => String(x).padStart(2, '0');
  return `${d.getUTCFullYear()}-${p(d.getUTCMonth() + 1)}-${p(d.getUTCDate())}`;
}

// 日付の曜日（0=日 .. 6=土）。週末の薄帯を引くため。
function weekday(s) {
  const ms = toMs(s);
  if (ms == null) return null;
  return new Date(ms).getUTCDay();
}

// "5d" / "2w" / "12h" / 5 → 日数（Mermaid の duration を日に換算）。
function parseDur(tok) {
  if (typeof tok === 'number') return tok;
  const m = /^(\d+(?:\.\d+)?)\s*(d|w|h)?$/.exec(String(tok).trim());
  if (!m) return null;
  const n = parseFloat(m[1]);
  return m[2] === 'w' ? n * 7 : m[2] === 'h' ? n / 24 : n;
}

// Mermaid の duration トークンか（"30d" "2w" "12h"）。
function isDur(s) { return /^\d+(?:\.\d+)?\s*(d|w|h)$/.test(String(s).trim()); }

/* ============================================================
   studio DSL のパーサ — Mermaid 記法を読む。
   みんなと AI が既に知っている書き方に寄せる：`gantt` と `flowchart`。
   レイアウト（ドラッグした位置・並び）は Mermaid のコメント `%% @layout`
   ブロックに畳むので、本物の Mermaid でもそのまま開ける。意味部は汚れない。

   gantt:
     gantt
       title 製品リリース計画
       dateFormat YYYY-MM-DD
       section 設計
         要件定義   :done, req, 2026-07-01, 5d
         基本設計   :active, design, after req, 7d
         出荷       :milestone, ship, after design, 0d
   flowchart:
     flowchart TD
       A[Web] --> B(API)
       B -->|認証| C{OK?}
       C --> D[(DB)]
       subgraph 裏方
         C
         D
       end
   トレイラ（Mermaid から見ればただのコメント）:
     %% @layout
     %% pos A 40 80          flowchart：ノード座標
     %% order req design …   gantt：行の並び
     %% at req 2026-07-03    gantt：手で動かした開始日
     %% today 2026-07-16     gantt：基準日（決定的な例のため）
   ============================================================ */

const TAGS = new Set(['done', 'active', 'crit', 'milestone']);

function blankModel() {
  return { kind: null, meta: {}, items: [], edges: [], groups: [],
    order: [], layout: { pos: {}, order: [], at: {} }, errors: [] };
}

// ---- ガント ---------------------------------------------------------------

function parseGanttTask(label, spec, prevId, model, ln) {
  const fields = spec.split(',').map((s) => s.trim()).filter((s) => s.length);
  const item = { type: 'task', id: null, label, tags: [], status: null,
    after: [], at: null, dur: 1 };
  let i = 0;
  // 先頭の状態タグ（done/active/crit/milestone）を食う。
  while (i < fields.length && TAGS.has(fields[i])) {
    const t = fields[i++];
    if (t === 'milestone') item.type = 'milestone';
    else { item.tags.push(t); item.status = item.status || t; }
  }
  // 残り：[id,] start [, end]
  const rest = fields.slice(i);
  let r = 0;
  // id：先頭が日付でも after でも duration でもない識別子なら id。
  if (rest[r] && !isDate(rest[r]) && !isDur(rest[r]) && !/^after\b/.test(rest[r])) {
    item.id = rest[r++];
  }
  // start
  if (rest[r] && /^after\b/.test(rest[r])) {
    item.after = rest[r].split(/\s+/).slice(1); r++;
  } else if (rest[r] && isDate(rest[r])) {
    item.at = rest[r++];
  } else if (rest[r] == null) {
    // start 省略 → 直前のタスクの後ろ（Mermaid の暗黙）。
    if (prevId) item.after = [prevId];
  }
  // end：日付 or 期間
  if (rest[r] != null) {
    if (isDur(rest[r])) item.dur = parseDur(rest[r]);
    else if (isDate(rest[r])) item._end = rest[r];           // 終了日（layout で開始日との差に）
    else model.errors.push(`L${ln}: 終了の指定が読めない「${rest[r]}」`);
    r++;
  } else if (item.type === 'milestone') item.dur = 0;
  if (!item.id) item.id = 't' + (model.items.length + 1);     // id 省略時は採番
  return item;
}

function parseGantt(lines, model) {
  model.kind = 'gantt';
  let section = null, prevId = null;
  for (const { raw, ln } of lines) {
    const line = raw.trim();
    const sp = line.indexOf(' ');
    const head = sp < 0 ? line : line.slice(0, sp);
    const rest = sp < 0 ? '' : line.slice(sp + 1).trim();
    if (head === 'gantt') continue;
    if (head === 'title') { model.meta.title = rest; continue; }
    if (head === 'dateFormat') { model.meta.dateFormat = rest; continue; }
    if (head === 'axisFormat') { model.meta.axisFormat = rest; continue; }
    if (head === 'section') { section = rest; continue; }
    if (['excludes', 'todayMarker', 'weekday', 'tickInterval'].includes(head)) continue; // 体裁系は無視
    // タスク行：「ラベル : spec」
    const c = line.indexOf(':');
    if (c < 0) { if (line) model.errors.push(`L${ln}: タスク行に ':' がない「${line}」`); continue; }
    const item = parseGanttTask(line.slice(0, c).trim(), line.slice(c + 1).trim(), prevId, model, ln);
    item.section = section; model.items.push(item); model.order.push(item.id); prevId = item.id;
  }
  return model;
}

// ---- フローチャート --------------------------------------------------------

// 形状の括弧 → 種別とラベル。長いものから試す。
const SHAPES = [
  [/^\(\[(.*?)\]\)/, 'stadium'], [/^\[\[(.*?)\]\]/, 'subroutine'], [/^\[\((.*?)\)\]/, 'cylinder'],
  [/^\(\((.*?)\)\)/, 'circle'], [/^\{\{(.*?)\}\}/, 'hexagon'],
  [/^\[(.*?)\]/, 'rect'], [/^\((.*?)\)/, 'round'], [/^\{(.*?)\}/, 'rhombus'], [/^>(.*?)\]/, 'flag'],
];
const ID_RE = /^[A-Za-z0-9_.-]+/;

function readNode(s, model) {
  const idm = ID_RE.exec(s);
  if (!idm) return null;
  const id = idm[0];
  let rest = s.slice(id.length), label = null, shape = 'rect';
  for (const [re, kind] of SHAPES) {
    const m = re.exec(rest);
    if (m) { label = m[1]; shape = kind; rest = rest.slice(m[0].length); break; }
  }
  // ノードを登録／更新（ラベルが来たら上書き、無ければ既存 or id）。
  let node = model.items.find((n) => n.id === id);
  if (!node) { node = { type: 'node', id, label: label ?? id, shape }; model.items.push(node); model.order.push(id); }
  else if (label != null) { node.label = label; node.shape = shape; }
  return { id, rest };
}

// コネクタ：--> / --- / -.-> / ==> と、|ラベル| or -- ラベル --> 。
const CONN_RE = /^\s*(?:--\s*([^->|][^>]*?)\s*-->|(-->|---|-\.->|-\.-|==>|===|--o|--x|x--x|o--o)\s*(?:\|([^|]*)\|)?)\s*/;
function readConn(s) {
  const m = CONN_RE.exec(s);
  if (!m) return null;
  const label = (m[1] ?? m[3] ?? '').trim();
  let op = m[2] || '-->';
  const dotted = /-\./.test(op), thick = /==|===/.test(op);
  const arrow = !/^(---|-\.-|===)$/.test(op);
  return { label, dotted, thick, arrow, len: m[0].length };
}

// 1 行を解釈し、その行で触れたノード id の配列を返す（subgraph 所属の判定に使う）。
function parseFlowLine(line, model, ln) {
  let s = line;
  const first = readNode(s, model);
  if (!first) { model.errors.push(`L${ln}: ノードが読めない「${line}」`); return []; }
  s = first.rest; let prev = first.id; const touched = [first.id];
  while (s.trim().length) {
    const conn = readConn(s);
    if (!conn) { if (s.trim()) model.errors.push(`L${ln}: つながりが読めない「${s.trim()}」`); break; }
    s = s.slice(conn.len);
    const nxt = readNode(s, model);
    if (!nxt) { model.errors.push(`L${ln}: 矢印の先のノードが無い`); break; }
    s = nxt.rest;
    model.edges.push({ from: prev, to: nxt.id, label: conn.label,
      dotted: conn.dotted, thick: conn.thick, arrow: conn.arrow });
    prev = nxt.id; touched.push(nxt.id);
  }
  return touched;
}

function stripName(s) {
  s = s.trim();
  const m = /^([A-Za-z0-9_.-]+)\s*\[(.*)\]$/.exec(s);     // subgraph id [Title]
  if (m) return m[2];
  return s.replace(/^["']|["']$/g, '');
}

function parseFlow(lines, model, dir) {
  model.kind = 'flowchart';
  model.meta.dir = dir || 'TD';
  const stack = [];                                        // subgraph のネスト
  for (const { raw, ln } of lines) {
    const line = raw.trim();
    if (!line) continue;
    const head = line.split(/\s+/)[0];
    if (head === 'flowchart' || head === 'graph') continue;
    if (head === 'subgraph') {
      const name = stripName(line.slice('subgraph'.length).trim()) || ('group' + (model.groups.length + 1));
      const g = { name, ids: [] }; model.groups.push(g); stack.push(g); continue;
    }
    if (line === 'end') { stack.pop(); continue; }
    if (head === 'direction') { model.meta.dir = line.split(/\s+/)[1] || model.meta.dir; continue; }
    if (['classDef', 'class', 'style', 'click', 'linkStyle'].includes(head)) continue; // 体裁系は無視
    // ノード/エッジ行。subgraph 内なら、この行で触れたノードをそのグループに入れる。
    const touched = parseFlowLine(line, model, ln);
    if (stack.length) {
      const g = stack[stack.length - 1];
      for (const id of touched) if (!g.ids.includes(id)) g.ids.push(id);
    }
  }
  return model;
}

// ---- 入口（共通：コメントと @layout の切り出し） ---------------------------

function parse(text) {
  const model = blankModel();
  const all = String(text).replace(/\r\n?/g, '\n').split('\n');
  const body = [];
  let inLayout = false;
  for (let i = 0; i < all.length; i++) {
    const raw = all[i], ln = i + 1, t = raw.trim();
    if (!t) continue;
    if (/^%%\{.*\}%%$/.test(t)) continue;                  // %%{init:…}%% ディレクティブは無視
    if (t === '%% @layout') { inLayout = true; continue; }
    if (t.startsWith('%%')) {
      const d = t.replace(/^%%\s*/, '').trim();
      if (inLayout || /^(pos|order|at|today)\b/.test(d) || d.startsWith('@today')) {
        const a = d.replace(/^@/, '').split(/\s+/);
        if (a[0] === 'pos' && a.length >= 4) model.layout.pos[a[1]] = [parseFloat(a[2]), parseFloat(a[3])];
        else if (a[0] === 'order') model.layout.order = a.slice(1);
        else if (a[0] === 'at' && a.length >= 3) model.layout.at[a[1]] = a[2];
        else if (a[0] === 'today' && a[1]) model.meta.today = a[1];
      }
      continue;                                            // ふつうのコメントは捨てる
    }
    body.push({ raw, ln });
  }

  if (!body.length) { model.errors.push('図がありません（gantt か flowchart で始めてください）'); return model; }
  const first = body[0].raw.trim();
  const headWord = first.split(/\s+/)[0];
  if (headWord === 'gantt') parseGantt(body, model);
  else if (headWord === 'flowchart' || headWord === 'graph') parseFlow(body, model, first.split(/\s+/)[1]);
  else model.errors.push(`先頭が gantt / flowchart ではありません「${headWord}」`);
  return model;
}

/* ============================================================
   レイアウト計算 — モデル＋（あれば）@layout から座標を出す。純粋・決定的。
   ガント：日付を解決し、タイムライン上の棒に（done/active/crit/milestone）。
   フローチャート：向き(TD/LR…)に従い、依存の深さで自動段組み（最長経路）。
   @layout pos があればそれを優先（手で動かした位置）。
   DOM もキャンバスも知らない。返すのは数だけ。
   ============================================================ */

const GANTT = { PAD: 16, LABEL_W: 176, AXIS_H: 44, ROW_H: 32, SEC_H: 26, DAY_W: 26, BAR_H: 18 };
const FLOW = { PAD: 28, NODE_H: 48, GAP_MAIN: 70, GAP_CROSS: 30, GROUP_PAD: 18, GROUP_HEAD: 24 };

// ---- ガント ---------------------------------------------------------------

function ganttBase(model) {
  if (model.meta.start) return model.meta.start;
  let min = null;
  for (const it of model.items) {
    const d = model.layout.at[it.id] || it.at;
    if (d && (min === null || diffDays(d, min) > 0)) min = d;
  }
  return min || model.meta.today || '2026-01-01';
}

function layoutGantt(model) {
  const G = GANTT, base = ganttBase(model), errors = [];
  const byId = new Map(model.items.map((it) => [it.id, it]));
  const startDay = {};
  const durOf = (it) => it.dur;

  // 開始日：@layout at > at > after の依存終了 > 0。依存が解けるまで反復。
  const explicit = (it) => model.layout.at[it.id] || it.at || null;
  let changed = true, guard = 0;
  while (changed && guard++ <= model.items.length + 1) {
    changed = false;
    for (const it of model.items) {
      if (it.id in startDay) continue;
      const ex = explicit(it);
      if (ex) {
        const d = diffDays(base, ex);
        if (d == null) { errors.push(`task ${it.id}: 日付が不正「${ex}」`); startDay[it.id] = 0; }
        else startDay[it.id] = d;
        changed = true;
      } else if (it.after.length === 0) { startDay[it.id] = 0; changed = true; }
      else if (it.after.every((d) => d in startDay)) {
        let s = 0;
        for (const dep of it.after) { const e = startDay[dep] + (byId.get(dep) ? durOf(byId.get(dep)) : 0); if (e > s) s = e; }
        startDay[it.id] = s; changed = true;
      }
    }
  }
  for (const it of model.items) if (!(it.id in startDay)) {
    startDay[it.id] = 0; errors.push(`task ${it.id}: 依存が解決できません（循環か未定義）`);
  }
  // 終了日（_end）が絶対指定なら、開始日との差を期間にする。
  for (const it of model.items) if (it._end != null) {
    const d = diffDays(base, it._end) - startDay[it.id];
    if (d != null && d >= 0) it.dur = d;
  }

  // 行の並び：@layout order を尊重し、漏れは元の順で補う。
  const ordSet = new Set(model.layout.order);
  const order = model.layout.order.filter((id) => byId.has(id))
    .concat(model.order.filter((id) => !ordSet.has(id)));

  const bars = [], sections = [];
  let y = G.AXIS_H + G.PAD, curSec;
  for (const id of order) {
    const it = byId.get(id); if (!it) continue;
    if (it.section !== curSec) {
      curSec = it.section;
      if (curSec) { sections.push({ name: curSec, y: y + 4 }); y += G.SEC_H; }
    }
    const sd = startDay[id], dur = it.dur;
    bars.push({
      id, label: it.label, type: it.type, status: it.status, section: it.section,
      x: G.LABEL_W + sd * G.DAY_W, y: y + (G.ROW_H - G.BAR_H) / 2,
      w: Math.max(it.type === 'milestone' ? G.BAR_H : 4, dur * G.DAY_W), h: G.BAR_H,
      rowY: y, startDay: sd, dur, startDate: addDays(base, sd), endDate: addDays(base, sd + dur),
    });
    y += G.ROW_H;
  }

  let maxDay = 1;
  for (const b of bars) maxDay = Math.max(maxDay, b.startDay + b.dur);
  maxDay += 2;
  const width = G.LABEL_W + maxDay * G.DAY_W + G.PAD;
  const height = Math.max(y + G.PAD, G.AXIS_H + 80);

  const days = [];
  for (let d = 0; d <= maxDay; d++) {
    const date = addDays(base, d);
    days.push({ d, date, x: G.LABEL_W + d * G.DAY_W, weekend: [0, 6].includes(weekday(date)) });
  }
  const today = model.meta.today
    ? { x: G.LABEL_W + diffDays(base, model.meta.today) * G.DAY_W, date: model.meta.today } : null;

  return { kind: 'gantt', base, dayW: G.DAY_W, labelW: G.LABEL_W, axisH: G.AXIS_H, rowH: G.ROW_H,
    bars, sections, days, today, width, height, errors };
}

// ---- フローチャート --------------------------------------------------------

function nodeSize(label, shape) {
  let w = 0; for (const ch of label) w += (ch.charCodeAt(0) > 0x2e7f ? 16 : 9);
  w = Math.max(84, Math.min(280, w + 36));
  let h = FLOW.NODE_H;
  if (shape === 'circle') { const d = Math.max(w, h, 64); return { w: d, h: d }; }
  if (shape === 'rhombus' || shape === 'hexagon') { w += 24; h += 8; }
  if (shape === 'stadium' || shape === 'cylinder') h += 4;
  return { w, h };
}

function clip(a, b) {
  const acx = a.x + a.w / 2, acy = a.y + a.h / 2, bcx = b.x + b.w / 2, bcy = b.y + b.h / 2;
  const edge = (r, cx, cy, tx, ty) => {
    const dx = tx - cx, dy = ty - cy;
    if (!dx && !dy) return [cx, cy];
    const s = Math.min(dx ? (r.w / 2) / Math.abs(dx) : Infinity, dy ? (r.h / 2) / Math.abs(dy) : Infinity);
    return [cx + dx * s, cy + dy * s];
  };
  return { from: edge(a, acx, acy, bcx, bcy), to: edge(b, bcx, bcy, acx, acy) };
}

function layoutFlow(model) {
  const dir = (model.meta.dir || 'TD').toUpperCase();
  const vertical = dir === 'TD' || dir === 'TB' || dir === 'BT';   // 段が縦に進む
  const reverse = dir === 'BT' || dir === 'RL';
  const nodes = model.items.filter((it) => it.type === 'node');
  const byId = new Map(nodes.map((n) => [n.id, n]));
  const preds = new Map(nodes.map((n) => [n.id, []]));
  for (const e of model.edges) if (byId.has(e.from) && byId.has(e.to)) preds.get(e.to).push(e.from);

  const depth = {}, visiting = new Set();
  const calc = (id) => {
    if (id in depth) return depth[id];
    if (visiting.has(id)) return 0;
    visiting.add(id);
    let d = 0; for (const p of preds.get(id) || []) d = Math.max(d, calc(p) + 1);
    visiting.delete(id); depth[id] = d; return d;
  };
  for (const n of nodes) calc(n.id);

  const layers = {};
  for (const n of nodes) (layers[depth[n.id]] ||= []).push(n.id);
  const keys = Object.keys(layers).map(Number).sort((a, b) => a - b);
  const maxDepth = keys.length ? keys[keys.length - 1] : 0;

  const placed = new Map();
  const sizeOf = (id) => nodeSize(byId.get(id).label, byId.get(id).shape);
  // 段ごとの主軸サイズ（縦なら高さ、横なら幅）の最大で段の位置を決める。
  const layerExtent = {};
  for (const c of keys) { let m = 0; for (const id of layers[c]) { const s = sizeOf(id); m = Math.max(m, vertical ? s.h : s.w); } layerExtent[c] = m; }
  const layerPos = {}; let acc = FLOW.PAD + (vertical ? 0 : 0);
  for (const c of keys) { layerPos[c] = acc; acc += layerExtent[c] + FLOW.GAP_MAIN; }

  for (const c of keys) {
    let cross = FLOW.PAD + FLOW.GROUP_HEAD;
    for (const id of layers[c]) {
      const s = sizeOf(id);
      const d = reverse ? (maxDepth - c) : c;
      const main = (layerPos[d] ?? layerPos[c]);
      if (vertical) placed.set(id, { id, label: byId.get(id).label, shape: byId.get(id).shape, x: cross, y: main, w: s.w, h: s.h });
      else placed.set(id, { id, label: byId.get(id).label, shape: byId.get(id).shape, x: main, y: cross, w: s.w, h: s.h });
      cross += (vertical ? s.w : s.h) + FLOW.GAP_CROSS;
    }
  }

  for (const n of nodes) { const p = model.layout.pos[n.id]; if (p) { const r = placed.get(n.id); r.x = p[0]; r.y = p[1]; } }

  const groups = [];
  for (const g of model.groups) {
    const mem = g.ids.map((id) => placed.get(id)).filter(Boolean);
    if (!mem.length) continue;
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const m of mem) { x0 = Math.min(x0, m.x); y0 = Math.min(y0, m.y); x1 = Math.max(x1, m.x + m.w); y1 = Math.max(y1, m.y + m.h); }
    groups.push({ name: g.name, x: x0 - FLOW.GROUP_PAD, y: y0 - FLOW.GROUP_PAD - FLOW.GROUP_HEAD,
      w: (x1 - x0) + FLOW.GROUP_PAD * 2, h: (y1 - y0) + FLOW.GROUP_PAD * 2 + FLOW.GROUP_HEAD });
  }

  const edges = [];
  for (const e of model.edges) {
    const a = placed.get(e.from), b = placed.get(e.to);
    if (a && b) { const c = clip(a, b); edges.push({ ...e, x1: c.from[0], y1: c.from[1], x2: c.to[0], y2: c.to[1],
      mx: (c.from[0] + c.to[0]) / 2, my: (c.from[1] + c.to[1]) / 2 }); }
  }

  let width = FLOW.PAD, height = FLOW.PAD;
  for (const r of placed.values()) { width = Math.max(width, r.x + r.w); height = Math.max(height, r.y + r.h); }
  for (const g of groups) { width = Math.max(width, g.x + g.w); height = Math.max(height, g.y + g.h); }
  return { kind: 'flowchart', dir, nodes: [...placed.values()], edges, groups,
    width: width + FLOW.PAD, height: height + FLOW.PAD, errors: [] };
}

function layout(model) {
  return model.kind === 'flowchart' ? layoutFlow(model) : layoutGantt(model);
}

/* ============================================================
   モデル → Mermaid テキスト（往復の戻り）。
   意味部は Mermaid の正規記法で書き、ドラッグの結果（位置・並び・開始日）は
   末尾の %% @layout コメントにだけ書く。Mermaid から見ればただのコメントなので
   そのまま貼って描ける。parse(serialize(model)) が安定することをテストが保証する。
   ============================================================ */

const num = (n) => (Math.round(n * 100) / 100).toString();

function ganttBody(model) {
  const out = ['gantt'];
  if (model.meta.title) out.push(`    title ${model.meta.title}`);
  out.push(`    dateFormat ${model.meta.dateFormat || 'YYYY-MM-DD'}`);
  if (model.meta.axisFormat) out.push(`    axisFormat ${model.meta.axisFormat}`);
  let curSec;
  for (const id of model.order) {
    const it = model.items.find((x) => x.id === id);
    if (!it) continue;
    if (it.section !== curSec) { curSec = it.section; if (curSec) out.push(`    section ${curSec}`); }
    const tags = [];
    if (it.type === 'milestone') tags.push('milestone');
    if (it.status) tags.push(it.status);
    const start = it.at ? it.at : (it.after.length ? `after ${it.after.join(' ')}` : it.at || '');
    const spec = [...tags, it.id, start, `${num(it.dur)}d`].filter((s) => s !== '').join(', ');
    out.push(`      ${it.label} :${spec}`);
  }
  return out;
}

const OP = (e) => {
  if (e.thick) return e.arrow ? '==>' : '===';
  if (e.dotted) return e.arrow ? '-.->' : '-.-';
  return e.arrow ? '-->' : '---';
};
const SHAPE = {
  rect: (s) => `[${s}]`, round: (s) => `(${s})`, stadium: (s) => `([${s}])`,
  subroutine: (s) => `[[${s}]]`, cylinder: (s) => `[(${s})]`, circle: (s) => `((${s}))`,
  rhombus: (s) => `{${s}}`, hexagon: (s) => `{{${s}}}`, flag: (s) => `>${s}]`,
};

function flowBody(model) {
  const out = [`flowchart ${model.meta.dir || 'TD'}`];
  const inGroup = new Set();
  for (const g of model.groups) for (const id of g.ids) inGroup.add(id);
  // ノード定義（形・ラベル）を先に。グループ外のものを宣言（中のものは subgraph 内で）。
  for (const id of model.order) {
    const n = model.items.find((x) => x.id === id);
    if (!n || n.type !== 'node' || inGroup.has(id)) continue;
    out.push(`    ${id}${(SHAPE[n.shape] || SHAPE.rect)(n.label)}`);
  }
  for (const e of model.edges) {
    const op = OP(e), lbl = e.label ? `|${e.label}|` : '';
    out.push(`    ${e.from} ${op}${lbl} ${e.to}`);
  }
  for (const g of model.groups) {
    out.push(`    subgraph ${g.name}`);
    for (const id of g.ids) {
      const n = model.items.find((x) => x.id === id);
      out.push(n ? `      ${id}${(SHAPE[n.shape] || SHAPE.rect)(n.label)}` : `      ${id}`);
    }
    out.push('    end');
  }
  return out;
}

function trailer(model) {
  const L = model.layout, out = [];
  if (model.kind === 'flowchart') {
    for (const id of model.order) if (L.pos[id]) out.push(`%% pos ${id} ${num(L.pos[id][0])} ${num(L.pos[id][1])}`);
  } else {
    if (L.order && L.order.length) out.push(`%% order ${L.order.join(' ')}`);
    for (const id of Object.keys(L.at)) out.push(`%% at ${id} ${L.at[id]}`);
    if (model.meta.today) out.push(`%% today ${model.meta.today}`);
  }
  return out.length ? ['', '%% @layout', ...out] : [];
}

function serialize(model) {
  const body = model.kind === 'flowchart' ? flowBody(model) : ganttBody(model);
  return [...body, ...trailer(model)].join('\n') + '\n';
}

/* ============================================================
   描画 — モデル＋レイアウト → SVG 文字列。純粋（DOM を触らない）。
   フローチャートは Mermaid の形（角丸・丸・スタジアム・円柱・円・菱形・六角）を描き分け、
   エッジは実線/点線/太線・矢印・ラベルを描く。
   ガントは done/active/crit/milestone を配色で見せる。
   各要素に data-id を付け、ui がつかんで動かす。
   ============================================================ */

const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const HUES = ['#6aa9ff', '#7ad1b0', '#f5b86a', '#d68ad6', '#f57a8a', '#8ad1f5', '#b8a6ff', '#9ad17a'];
const hueOf = (i) => HUES[((i % HUES.length) + HUES.length) % HUES.length];

const DEFS = `<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3b5"/></marker>
</defs>`;

function wrap(L, inner) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${Math.ceil(L.width)} ${Math.ceil(L.height)}" `
    + `width="${Math.ceil(L.width)}" height="${Math.ceil(L.height)}" font-family="ui-sans-serif,system-ui,sans-serif">`
    + DEFS + inner + '</svg>';
}

// ---- ガント ---------------------------------------------------------------

function drawGantt(model, L) {
  const secIndex = new Map(); let si = -1, last;
  for (const b of L.bars) { if (b.section !== last) { last = b.section; si++; } secIndex.set(b.id, b.section ? si : 0); }
  const parts = [];

  for (const d of L.days) if (d.weekend)
    parts.push(`<rect x="${d.x}" y="${L.axisH}" width="${L.dayW}" height="${L.height - L.axisH}" fill="#ffffff" opacity="0.03"/>`);
  for (const d of L.days) {
    parts.push(`<line x1="${d.x}" y1="${L.axisH}" x2="${d.x}" y2="${L.height}" stroke="#ffffff" stroke-opacity="0.05"/>`);
    if (d.d % 7 === 0) parts.push(`<text x="${d.x + 3}" y="${L.axisH - 14}" fill="#8a93a6" font-size="10">${esc(d.date.slice(5))}</text>`);
  }
  if (L.today) parts.push(
    `<line x1="${L.today.x}" y1="${L.axisH - 6}" x2="${L.today.x}" y2="${L.height}" stroke="#f57a8a" stroke-width="1.5" stroke-dasharray="3 3"/>`,
    `<text x="${L.today.x + 4}" y="${L.axisH - 2}" fill="#f57a8a" font-size="10">today</text>`);

  const byId = new Map(L.bars.map((b) => [b.id, b]));
  for (const b of L.bars) {
    const it = model.items.find((x) => x.id === b.id);
    for (const dep of (it?.after || [])) {
      const a = byId.get(dep); if (!a) continue;
      const x1 = a.x + a.w, y1 = a.y + a.h / 2, x2 = b.x, y2 = b.y + b.h / 2;
      parts.push(`<path d="M${x1},${y1} C${x1 + 12},${y1} ${x2 - 12},${y2} ${x2},${y2}" fill="none" stroke="#9aa3b5" stroke-opacity="0.4" marker-end="url(#arrow)"/>`);
    }
  }
  for (const s of L.sections)
    parts.push(`<text x="8" y="${s.y + 14}" fill="#aeb6c6" font-size="11" font-weight="600">${esc(s.name)}</text>`);

  for (const b of L.bars) {
    const hue = hueOf(secIndex.get(b.id));
    parts.push(`<text x="8" y="${b.rowY + L.rowH / 2 + 4}" fill="#d7dbe6" font-size="12">${esc(b.label)}</text>`);
    if (b.type === 'milestone') {
      const cx = b.x, cy = b.y + b.h / 2, r = b.h / 2;
      parts.push(`<g data-drag="bar" data-id="${esc(b.id)}" style="cursor:grab"><path d="M${cx},${cy - r} L${cx + r},${cy} L${cx},${cy + r} L${cx - r},${cy} z" fill="${hue}" stroke="#0b0e14"/></g>`);
    } else {
      const crit = b.status === 'crit', active = b.status === 'active', done = b.status === 'done';
      const fillOp = done ? 0.95 : active ? 0.5 : 0.9;
      let g = `<g data-drag="bar" data-id="${esc(b.id)}" style="cursor:grab">`
        + `<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="4" fill="${hue}" opacity="${fillOp}"`
        + (crit ? ` stroke="#f5667a" stroke-width="2"` : active ? ` stroke="${hue}" stroke-width="1.5" stroke-dasharray="4 3"` : '') + `/>`;
      if (done) g += `<path d="M${b.x + 5},${b.y + b.h / 2} l3,4 l6,-7" fill="none" stroke="#0b0e14" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>`;
      parts.push(g + `</g>`);
    }
  }
  return wrap(L, parts.join('\n'));
}

// ---- フローチャート --------------------------------------------------------

function shapePath(n) {
  const { x, y, w, h } = n, r = Math.min(12, h / 2);
  switch (n.shape) {
    case 'round': return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${r}"/>`;
    case 'stadium': return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${h / 2}"/>`;
    case 'circle': return `<ellipse cx="${x + w / 2}" cy="${y + h / 2}" rx="${w / 2}" ry="${h / 2}"/>`;
    case 'rhombus': return `<polygon points="${x + w / 2},${y} ${x + w},${y + h / 2} ${x + w / 2},${y + h} ${x},${y + h / 2}"/>`;
    case 'hexagon': { const o = Math.min(18, w / 4); return `<polygon points="${x + o},${y} ${x + w - o},${y} ${x + w},${y + h / 2} ${x + w - o},${y + h} ${x + o},${y + h} ${x},${y + h / 2}"/>`; }
    case 'cylinder': { const e = Math.min(8, h / 5); return `<path d="M${x},${y + e} a${w / 2},${e} 0 0 1 ${w},0 v${h - 2 * e} a${w / 2},${e} 0 0 1 ${-w},0 z M${x},${y + e} a${w / 2},${e} 0 0 0 ${w},0"/>`; }
    case 'subroutine': return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="2"/><line x1="${x + 6}" y1="${y}" x2="${x + 6}" y2="${y + h}"/><line x1="${x + w - 6}" y1="${y}" x2="${x + w - 6}" y2="${y + h}"/>`;
    default: return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5"/>`;
  }
}

function drawFlow(model, L) {
  const parts = [];
  for (const g of L.groups) {
    parts.push(`<rect x="${g.x}" y="${g.y}" width="${g.w}" height="${g.h}" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#5a6b86" stroke-dasharray="4 4"/>`);
    parts.push(`<text x="${g.x + 12}" y="${g.y + 16}" fill="#aeb6c6" font-size="11" font-weight="600">${esc(g.name)}</text>`);
  }
  for (const e of L.edges) {
    const dash = e.dotted ? ` stroke-dasharray="2 4"` : '';
    const wdt = e.thick ? 2.5 : 1.4;
    parts.push(`<line x1="${e.x1}" y1="${e.y1}" x2="${e.x2}" y2="${e.y2}" stroke="#9aa3b5" stroke-opacity="0.75" stroke-width="${wdt}"${dash}${e.arrow ? ' marker-end="url(#arrow)"' : ''}/>`);
    if (e.label) {
      const tw = e.label.length * 7 + 10;
      parts.push(`<rect x="${e.mx - tw / 2}" y="${e.my - 9}" width="${tw}" height="18" rx="4" fill="#0b0e14" opacity="0.85"/>`
        + `<text x="${e.mx}" y="${e.my + 4}" fill="#c7d0e0" font-size="11" text-anchor="middle">${esc(e.label)}</text>`);
    }
  }
  L.nodes.forEach((n, i) => {
    const hue = hueOf(i);
    const inner = shapePath(n).replace(/<(rect|ellipse|polygon|path)([^>]*?)\/>/g,
      `<$1$2 fill="#161b26" stroke="${hue}" stroke-width="1.5"/>`)
      .replace(/<line([^>]*?)\/>/g, `<line$1 stroke="${hue}" stroke-width="1.3"/>`);
    parts.push(`<g data-drag="node" data-id="${esc(n.id)}" style="cursor:grab">${inner}`
      + `<text x="${n.x + n.w / 2}" y="${n.y + n.h / 2 + 4}" fill="#e7ebf4" font-size="12.5" text-anchor="middle">${esc(n.label)}</text></g>`);
  });
  return wrap(L, parts.join('\n'));
}

function draw(model, L) {
  return L.kind === 'flowchart' ? drawFlow(model, L) : drawGantt(model, L);
}

/* ============================================================
   studio のエディタ — Mermaid を書き、その場で図にし、グリグリ動かす。
   構文ハイライト・行番号・リアルタイム検証（エラー下線＋一覧）・オートコンプリート、
   ズーム/パン/フィット、スナップ付きドラッグ、サンプル、各種エクスポート（DSL/.mmd/SVG/単一HTML）。
   描画の核（parse/layout/serialize/draw）は依存ゼロ・決定的。ここはそれを操る手。
   ============================================================ */

const escHtml = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

const SAMPLES = {
  'ガント — 製品リリース計画': `gantt
    title 製品リリース計画
    dateFormat YYYY-MM-DD
    section 設計
      要件定義   :done, req, 2026-07-01, 5d
      基本設計   :active, design, after req, 7d
    section 実装
      API 実装   :api, after design, 10d
      UI 実装    :ui, after design, 12d
      基盤構築   :crit, infra, 2026-07-08, 9d
    section 検証と出荷
      結合テスト :test, after api ui, 6d
      受け入れ   :uat, after test, 4d
      出荷       :milestone, ship, after uat, 0d
%% @layout
%% today 2026-07-16`,
  'フロー — サービス構成図': `flowchart TD
    web[Web フロント] --> gw(API ゲートウェイ)
    mobile([モバイル]) --> gw
    gw -->|認証| auth{認証OK?}
    gw --> order[注文サービス]
    gw --> cat[カタログ]
    order --> pay[決済]
    order --> db[(主データベース)]
    cat --> cache((キャッシュ))
    auth --> db
    subgraph クライアント
      web
      mobile
    end
    subgraph データ基盤
      db
      cache
    end`,
  'フロー — 状態遷移': `flowchart LR
    s([開始]) --> a[下書き]
    a -->|提出| b{レビュー}
    b -->|承認| c[公開]
    b -->|差戻し| a
    c --> e([終了])`,
};

const MODULES = ['engine/date.js', 'engine/parse.js', 'engine/layout.js', 'engine/serialize.js', 'render/draw.js', 'ui/editor.js'];

// ---- 構文ハイライト --------------------------------------------------------
const HL = /(-->|---|-\.->|-\.-|==>|===|--o|--x)|(\|[^|]*\|)|\b(gantt|flowchart|graph|title|dateFormat|axisFormat|section|subgraph|end|direction|after)\b|\b(done|active|crit|milestone)\b|(\d{4}[-/]\d{1,2}[-/]\d{1,2})|\b(\d+(?:\.\d+)?[dwh])\b/g;
function hlLine(line) {
  if (line.trimStart().startsWith('%%')) return `<span class="tk-com">${escHtml(line)}</span>`;
  let out = '', last = 0, m; HL.lastIndex = 0;
  while ((m = HL.exec(line))) {
    out += escHtml(line.slice(last, m.index));
    const cls = (m[1] || m[2]) ? 'tk-arrow' : m[3] ? 'tk-kw' : m[4] ? 'tk-tag' : 'tk-date';
    out += `<span class="${cls}">${escHtml(m[0])}</span>`;
    last = m.index + m[0].length;
  }
  return out + escHtml(line.slice(last));
}

function boot() {
  const $ = (id) => document.getElementById(id);
  const src = $('src'), hl = $('hl'), gutter = $('gutter'), canvas = $('canvas'), stage = $('stage');
  const status = $('status'), kindBadge = $('kind'), problems = $('problems'), ac = $('ac');
  let model = parse(''), L = null;
  const view = { tx: 0, ty: 0, s: 1 };

  // ---- 描画パイプライン ----
  function highlight() {
    const lines = src.value.split('\n');
    hl.innerHTML = lines.map(hlLine).join('\n') + '\n';
    gutter.innerHTML = lines.map((_, i) => `<div class="ln" data-ln="${i + 1}">${i + 1}</div>`).join('');
    syncScroll();
  }
  function syncScroll() { hl.parentElement.scrollTop = src.scrollTop; hl.parentElement.scrollLeft = src.scrollLeft; gutter.scrollTop = src.scrollTop; }

  function render() {
    model = parse(src.value);
    L = layout(model);
    canvas.innerHTML = draw(model, L);
    applyView();
    kindBadge.textContent = model.kind || '—';
    const probs = [...model.errors.map((e) => ({ e, where: 'parse' })), ...(L.errors || []).map((e) => ({ e, where: 'layout' }))];
    const badLines = new Set();
    problems.innerHTML = probs.map(({ e }) => {
      const m = /^L(\d+)/.exec(e); if (m) badLines.add(+m[1]);
      return `<div class="p"${m ? ` data-ln="${m[1]}"` : ''}>${m ? `<span class="ln">L${m[1]}</span>` : '<span class="ln">•</span>'}<span>${escHtml(e.replace(/^L\d+:\s*/, ''))}</span></div>`;
    }).join('');
    for (const el of gutter.children) el.classList.toggle('bad', badLines.has(+el.dataset.ln));
    status.textContent = probs.length ? `${probs.length} 件の指摘` : (model.kind ? `${model.kind} ・ ${model.items.length} 項目 ・ OK` : '空です');
    status.dataset.bad = probs.length ? '1' : '';
    refreshIns();
  }

  // ---- ビュー（ズーム・パン・フィット） ----
  function applyView() { canvas.style.transform = `translate(${view.tx}px,${view.ty}px) scale(${view.s})`; $('zLabel').textContent = Math.round(view.s * 100) + '%'; }
  function fit() {
    if (!L) return;
    const r = stage.getBoundingClientRect(), pad = 40;
    view.s = Math.max(0.2, Math.min(2, Math.min((r.width - pad) / L.width, (r.height - pad) / L.height)));
    view.tx = (r.width - L.width * view.s) / 2; view.ty = Math.max(16, (r.height - L.height * view.s) / 2);
    applyView();
  }
  function zoomAt(cx, cy, factor) {
    const r = stage.getBoundingClientRect(), x = cx - r.left, y = cy - r.top;
    const ns = Math.max(0.15, Math.min(4, view.s * factor));
    view.tx = x - (x - view.tx) * (ns / view.s); view.ty = y - (y - view.ty) * (ns / view.s); view.s = ns; applyView();
  }
  stage.addEventListener('wheel', (e) => { e.preventDefault(); zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.1 : 1 / 1.1); }, { passive: false });
  $('zIn').onclick = () => { const r = stage.getBoundingClientRect(); zoomAt(r.left + r.width / 2, r.top + r.height / 2, 1.2); };
  $('zOut').onclick = () => { const r = stage.getBoundingClientRect(); zoomAt(r.left + r.width / 2, r.top + r.height / 2, 1 / 1.2); };
  $('zFit').onclick = fit;

  // ---- ドラッグ（要素を動かす／空きをパン）----
  let drag = null, pan = null;
  stage.addEventListener('pointerdown', (e) => {
    const g = e.target.closest('[data-drag]');
    if (g) {
      const id = g.dataset.id, kind = g.dataset.drag;
      if (kind === 'node') { const n = L.nodes.find((x) => x.id === id); drag = { id, kind, x0: n.x, y0: n.y, px: e.clientX, py: e.clientY }; }
      else { const b = L.bars.find((x) => x.id === id); drag = { id, kind, day0: b.startDay, order: L.bars.map((x) => x.id), px: e.clientX, py: e.clientY }; }
    } else { pan = { tx: view.tx, ty: view.ty, px: e.clientX, py: e.clientY }; stage.classList.add('panning'); }
    stage.setPointerCapture?.(e.pointerId); e.preventDefault();
  });
  stage.addEventListener('pointermove', (e) => {
    if (drag) {
      const dx = (e.clientX - drag.px) / view.s, dy = (e.clientY - drag.py) / view.s;
      if (drag.kind === 'node') {
        const snap = (v) => Math.round(v / 8) * 8;
        model.layout.pos[drag.id] = [snap(drag.x0 + dx), snap(drag.y0 + dy)];
      } else {
        model.layout.at[drag.id] = addDays(L.base, drag.day0 + Math.round(dx / L.dayW));
        const steps = Math.round(dy / L.rowH);
        if (steps) { const o = drag.order.slice(), f = o.indexOf(drag.id); o.splice(Math.max(0, Math.min(o.length - 1, f + steps)), 0, o.splice(f, 1)[0]); model.layout.order = o; }
      }
      const keep = { ...view }; canvas.innerHTML = draw(model, L = layout(model)); Object.assign(view, keep); applyView();
    } else if (pan) { view.tx = pan.tx + (e.clientX - pan.px); view.ty = pan.ty + (e.clientY - pan.py); applyView(); }
  });
  function endDrag() { if (drag) { src.value = serialize(model); highlight(); render(); } drag = null; pan = null; stage.classList.remove('panning'); }
  stage.addEventListener('pointerup', endDrag); stage.addEventListener('pointercancel', endDrag);

  // ---- 入力（編集 → 図）----
  let t; src.addEventListener('input', () => { highlight(); clearTimeout(t); t = setTimeout(render, 140); autocomplete(); });
  src.addEventListener('scroll', syncScroll);
  src.addEventListener('keydown', onKey);

  // ---- オートコンプリート ----
  let acItems = [], acSel = 0, acWord = '';
  function wordBefore() { const p = src.selectionStart, left = src.value.slice(0, p); const m = /[A-Za-z0-9_]+$/.exec(left); return { word: m ? m[0] : '', start: m ? p - m[0].length : p, line: left.split('\n').pop() }; }
  function suggestions(ctx) {
    const kw = model.kind === 'gantt'
      ? ['title', 'dateFormat', 'section', 'done', 'active', 'crit', 'milestone', 'after']
      : ['flowchart', 'graph', 'subgraph', 'end', 'direction'];
    const ids = model.items.map((n) => n.id);
    const pool = [];
    if (/after\s+[\w\s]*$/.test(ctx.line) && model.kind === 'gantt') for (const id of ids) pool.push({ k: id, d: 'task' });
    else if (/(-->|---|-\.->|==>)\s*\w*$/.test(ctx.line)) for (const id of ids) pool.push({ k: id, d: 'node' });
    else { for (const k of kw) pool.push({ k, d: 'keyword' }); for (const id of ids) pool.push({ k: id, d: 'id' }); }
    const w = ctx.word.toLowerCase();
    return pool.filter((o) => w ? o.k.toLowerCase().startsWith(w) && o.k.toLowerCase() !== w : true).slice(0, 8);
  }
  function autocomplete() {
    const ctx = wordBefore(); acWord = ctx.word;
    if (ctx.word.length < 1 && !/(after\s+|-->\s*|---\s*)$/.test(ctx.line)) return hideAc();
    acItems = suggestions(ctx); acSel = 0;
    if (!acItems.length) return hideAc();
    ac.innerHTML = acItems.map((o, i) => `<div class="opt${i === 0 ? ' sel' : ''}" data-i="${i}"><span class="k">${escHtml(o.k)}</span><span class="d">${o.d}</span></div>`).join('');
    placeAc(); ac.hidden = false;
  }
  function placeAc() {
    const cr = src.getBoundingClientRect(), lh = 20, padL = 12, padT = 12;
    const left = src.value.slice(0, src.selectionStart); const lines = left.split('\n');
    const col = lines[lines.length - 1].length, row = lines.length - 1;
    const cw = 7.8;
    ac.style.left = Math.min(cr.left + padL + col * cw - src.scrollLeft, cr.right - 180) + 'px';
    ac.style.top = (cr.top + padT + (row + 1) * lh - src.scrollTop + 4) + 'px';
  }
  function hideAc() { ac.hidden = true; acItems = []; }
  function acceptAc() {
    const o = acItems[acSel]; if (!o) return;
    const ctx = wordBefore(); const p = src.selectionStart;
    src.value = src.value.slice(0, ctx.start) + o.k + src.value.slice(p);
    const np = ctx.start + o.k.length; src.selectionStart = src.selectionEnd = np;
    hideAc(); highlight(); render();
  }
  ac.addEventListener('pointerdown', (e) => { const opt = e.target.closest('.opt'); if (opt) { acSel = +opt.dataset.i; acceptAc(); e.preventDefault(); } });
  function onKey(e) {
    if (!ac.hidden && acItems.length) {
      if (e.key === 'ArrowDown') { acSel = (acSel + 1) % acItems.length; drawAc(); e.preventDefault(); return; }
      if (e.key === 'ArrowUp') { acSel = (acSel - 1 + acItems.length) % acItems.length; drawAc(); e.preventDefault(); return; }
      if (e.key === 'Enter' || e.key === 'Tab') { acceptAc(); e.preventDefault(); return; }
      if (e.key === 'Escape') { hideAc(); return; }
    }
    if (e.key === 'Tab') { e.preventDefault(); const p = src.selectionStart; src.value = src.value.slice(0, p) + '  ' + src.value.slice(src.selectionEnd); src.selectionStart = src.selectionEnd = p + 2; highlight(); }
  }
  function drawAc() { for (const el of ac.children) el.classList.toggle('sel', +el.dataset.i === acSel); }

  // ---- 挿入（スニペット）----
  function refreshIns() {
    const ins = $('insbar');
    const snips = model.kind === 'gantt'
      ? [['＋タスク', '\n      新しいタスク :t{N}, after {last}, 3d'], ['＋セクション', '\n    section 新しい区分'], ['＋マイルストン', '\n      節目 :milestone, m{N}, after {last}, 0d']]
      : [['＋ノード', '\n    n{N}[新しいノード]'], ['＋エッジ', '\n    {last} --> n{N}'], ['＋グループ', '\n    subgraph 新グループ\n    end']];
    ins.innerHTML = snips.map((s, i) => `<button data-i="${i}">${s[0]}</button>`).join('');
    for (const b of ins.children) b.onclick = () => insert(snips[+b.dataset.i][1]);
  }
  function insert(tpl) {
    const n = model.items.length + 1, last = model.items.length ? model.items[model.items.length - 1].id : 'x';
    const text = tpl.replace(/\{N\}/g, n).replace(/\{last\}/g, last);
    const end = src.value.replace(/\n+$/, '').length;
    src.value = src.value.slice(0, end) + text + src.value.slice(end);
    highlight(); render();
  }

  // ---- サンプル ----
  const sel = $('samples');
  sel.innerHTML = Object.keys(SAMPLES).map((k) => `<option>${k}</option>`).join('');
  sel.onchange = () => setText(SAMPLES[sel.value], true);

  // ---- エクスポート ----
  const menu = $('exportMenu');
  $('bExport').onclick = () => { menu.hidden = !menu.hidden; };
  document.addEventListener('click', (e) => { if (!e.target.closest('.menu')) menu.hidden = true; });
  function download(name, text, type = 'text/plain') { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text], { type })); a.download = name; a.click(); URL.revokeObjectURL(a.href); }
  function strip(s) { return s.split('\n').filter((l) => !/^\s*import\b/.test(l)).map((l) => l.replace(/^\s*export\s+(function|const|class|let)\b/, '$1')).join('\n'); }
  async function standalone(source) {
    if (window.__STUDIO_HTML__) return window.__STUDIO_HTML__(source);   // 単一HTML自身が持つ場合
    const base = new URL('.', location.href);
    const [page, css, ...mods] = await Promise.all([
      fetch(new URL('index.html', base)).then((r) => r.text()),
      fetch(new URL('ui/editor.css', base)).then((r) => r.text()),
      ...MODULES.map((m) => fetch(new URL(m, base)).then((r) => r.text())),
    ]);
    const bundle = mods.map(strip).join('\n');
    return page.replace(/<link rel="stylesheet"[^>]*>/, `<style>\n${css}\n</style>`)
      .replace(/<script type="module">[\s\S]*?<\/script>/, `<script>\nwindow.STUDIO_SOURCE=${JSON.stringify(source)};\n${bundle}\nboot();\n<\/script>`);
  }
  const slug = (s) => (s || 'diagram').toLowerCase().replace(/[^\w぀-ヿ一-龯]+/g, '-').replace(/^-|-$/g, '') || 'diagram';
  menu.addEventListener('click', async (e) => {
    const x = e.target.dataset.x; if (!x) return; menu.hidden = true;
    const name = slug(model.meta.title || model.kind);
    if (x === 'dsl') { try { await navigator.clipboard.writeText(serialize(model)); toast('DSL をコピーしました'); } catch (_) { toast('コピーできませんでした'); } }
    else if (x === 'mmd') download(name + '.mmd', serialize(model), 'text/plain');
    else if (x === 'svg') { const s = canvas.querySelector('svg'); download(name + '.svg', '<?xml version="1.0"?>\n' + s.outerHTML, 'image/svg+xml'); }
    else if (x === 'html') { try { download(name + '.html', await standalone(serialize(model)), 'text/html'); toast('単一 HTML を保存しました'); } catch (_) { toast('HTML 化に失敗（オンラインのエディタでお試しを）'); } }
  });

  // ---- トースト・モバイル ----
  function toast(m) { const t2 = $('toast'); t2.textContent = m; t2.hidden = false; requestAnimationFrame(() => t2.classList.add('on')); clearTimeout(toast._t); toast._t = setTimeout(() => t2.classList.remove('on'), 1600); }
  $('vToggle').onclick = () => document.body.classList.toggle('viewmax');
  problems.addEventListener('click', (e) => { const p = e.target.closest('.p'); if (!p || !p.dataset.ln) return; const ln = +p.dataset.ln; const pos = src.value.split('\n').slice(0, ln - 1).join('\n').length + (ln > 1 ? 1 : 0); src.focus(); src.selectionStart = src.selectionEnd = pos; });
  window.addEventListener('resize', () => { if (L) applyView(); });

  // ---- 起動 ----
  function setText(text, doFit) { src.value = text; highlight(); render(); if (doFit) fit(); hideAc(); }
  const initial = window.STUDIO_SOURCE || SAMPLES[Object.keys(SAMPLES)[0]];
  setText(initial, true);
}

// 単一 HTML 版（build.js が SOURCE を注入）でも同じ boot で動く。
if (typeof window !== 'undefined' && window.STUDIO_AUTOBOOT) boot();

boot();
</script>
</body>
