<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="studio — Mermaid 記法で書けて、グリグリ動かせる作図エディタ。ガントチャートと機能構成図（フローチャート）。構文ハイライト・リアルタイム検証・補完・ドラッグ・各種エクスポート。">
<meta name="theme-color" content="#0b0e14">
<title>studio — Mermaid で書く作図エディタ</title>
<link rel="stylesheet" href="ui/editor.css">
</head>
<body>
<header>
  <span class="brand">studio</span>
  <span id="kind" class="badge">—</span>
  <label class="pick">サンプル
    <select id="samples"></select>
  </label>
  <span class="sp"></span>
  <div class="ins" id="insbar"></div>
  <span id="status" class="status"></span>
  <button id="bImport">取り込み</button>
  <div class="menu">
    <button id="bExport">エクスポート ▾</button>
    <div id="exportMenu" class="dropdown" hidden>
      <button data-x="dsl">DSL をコピー</button>
      <button data-x="mmd">.mmd を保存</button>
      <button data-x="svg">SVG を保存</button>
      <button data-x="png">PNG を保存</button>
      <button data-x="html">単一 HTML を保存</button>
    </div>
  </div>
</header>

<main>
  <section class="editor" id="editor">
    <div class="codewrap">
      <div class="gutter" id="gutter"></div>
      <div class="code">
        <pre class="hl" aria-hidden="true"><code id="hl"></code></pre>
        <textarea id="src" spellcheck="false" autocapitalize="off" autocomplete="off" autocorrect="off" wrap="off"></textarea>
      </div>
    </div>
    <div class="problems" id="problems"></div>
  </section>

  <section class="view" id="view">
    <div class="stage" id="stage"><div id="canvas"></div></div>
    <div class="zoombar">
      <button id="zOut">－</button>
      <span id="zLabel">100%</span>
      <button id="zIn">＋</button>
      <button id="zFit">フィット</button>
      <button id="vToggle" class="only-mobile">コード ◧</button>
    </div>
  </section>
</main>

<div id="ac" class="ac" hidden></div>
<div id="toast" hidden></div>
<input id="inline" type="text" hidden>

<div id="importDlg" class="dlg" hidden>
  <div class="box">
    <h3>データの流し込み（CSV / TSV / Mermaid）</h3>
    <p class="hint">1 行目はヘッダ。<b>ガント</b>：名前(label)・開始(start)・期間(duration)・依存(after)・状態(status)・区分(section)・link。<b>フロー</b>：from・to・label。列名は日英どちらでも。Mermaid テキストはそのまま読み込みます。</p>
    <textarea id="csvIn" spellcheck="false" placeholder="名前,開始,期間,依存,状態,区分
要件定義,2026-07-01,5,,完了,設計
基本設計,,7,要件定義,進行中,設計
API 実装,,10,基本設計,,実装"></textarea>
    <div class="row">
      <span class="hint" style="margin-right:auto"><input type="file" id="csvFile" accept=".csv,.tsv,.txt,.mmd" hidden><a href="#" id="csvPick">ファイルを選ぶ…</a>（画面へのドロップでも可）</span>
      <button id="csvCancel" class="ghost2">閉じる</button>
      <button id="csvGo">図にする</button>
    </div>
  </div>
</div>

<script type="module">
  import { boot } from './ui/editor.js';
  boot();
</script>
</body>
</html>
