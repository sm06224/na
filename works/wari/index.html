<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="割 (wari) — 旅行や飲み会の立て替えを、最小の送金回数で精算する。人ごとの傾斜（割合）・領収書の添付・支払い済みチェックつき。登録なし・サーバーなし・お金の記録は端末から出ない。リンク一本で共有。">
<meta name="theme-color" content="#0f1512">
<title>割 — 誰が誰にいくら払えばいい？</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>割 <span class="en">/ wari</span></h1>
  <p class="tagline">立て替えを、最小の送金で精算する</p>
</header>

<main>
  <section class="panel">
    <div class="phead"><h2>みんな</h2>
      <select id="cur" class="mini" aria-label="通貨">
        <option value="¥">¥ 円</option><option value="$">$ ドル</option>
        <option value="€">€ ユーロ</option><option value="">記号なし</option>
      </select>
    </div>
    <div id="members" class="chips"></div>
    <form id="addMember" class="addrow">
      <input id="memberName" placeholder="名前（カンマ・スペースで複数可）" autocomplete="off">
      <button type="submit" class="add">＋</button>
    </form>
    <div class="addrow countrow">
      <span class="countlabel">人数から作る</span>
      <input id="memberCount" type="number" min="1" max="50" step="1" placeholder="人数">
      <button id="addCount" type="button" class="add">人を作る</button>
    </div>
    <p class="hint mini-hint">名前をタップで変更。「×割合」で傾斜（子どもは0.5、幹事は多めなど）を一度決めると、すべての出費に効きます。</p>
  </section>

  <section class="panel">
    <div class="phead"><h2>出費</h2><span id="total" class="total"></span></div>
    <div id="expenses" class="exlist"></div>

    <form id="addExpense" class="exform">
      <input id="exTitle" placeholder="何に使った？（例：宿・夕食）" autocomplete="off" maxlength="24">
      <div class="exrow">
        <label>払った人 <select id="exPayer"></select></label>
        <label>金額 <input id="exAmount" type="number" inputmode="numeric" min="0" step="1" placeholder="0"></label>
      </div>
      <div class="who">
        <div class="wholabel">割る人
          <label class="wtoggle"><input type="checkbox" id="exWeighted"> この出費だけ割合を変える</label>
        </div>
        <div id="exParts" class="parts"></div>
      </div>
      <div class="exrow receipt">
        <label class="rcpbtn">📷 領収書をつける
          <input id="exReceipt" type="file" accept="image/*" hidden>
        </label>
        <div id="exReceiptPrev" class="rcpprev"></div>
      </div>
      <button type="submit" class="add wide">この出費を足す</button>
    </form>
  </section>

  <section class="panel result">
    <h2>精算</h2>
    <div id="balances" class="balances"></div>
    <div id="transfers" class="transfers"></div>
  </section>

  <div class="row foot-actions">
    <button id="share" class="pill primary">この精算を送る</button>
    <button id="clear" class="pill">まっさらにする</button>
  </div>
</main>

<div id="lightbox" class="lightbox" hidden><img id="lightimg" alt="領収書"></div>
<div id="toast" hidden></div>

<footer>
  お金の記録も領収書も、端末から一歩も出ません。リンクには金額だけが畳まれます（領収書は手元に残ります）。<br>
  <a href="./README.md">しくみ</a> · <a href="../../">作品集</a>
</footer>

<script type="module" src="js/ui/main.js"></script>
</body>
</html>
