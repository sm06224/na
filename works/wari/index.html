<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="割 (wari) — イベントの会計を、計画→事前→当日→事後→精算のフェーズで、表で一目に。立て替えを最小の送金で再分配。傾斜・領収書・支払い済み・メモつき。登録なし・サーバーなし・お金の記録は端末から出ない。">
<meta name="theme-color" content="#0f1512">
<title>割 — イベントの会計と精算</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>割 <span class="en">/ wari</span></h1>
  <p class="tagline">計画から精算まで、表で一目に</p>
</header>

<main>
  <section class="panel">
    <div class="phead"><h2>みんな</h2>
      <select id="cur" class="mini" aria-label="通貨">
        <option value="¥">¥ 円</option><option value="$">$ ドル</option>
        <option value="€">€ ユーロ</option><option value="">記号なし</option>
      </select>
    </div>
    <div id="members" class="chips"></div>
    <form id="addMember" class="addrow">
      <input id="memberName" placeholder="名前（カンマ・スペースで複数可）" autocomplete="off">
      <button type="submit" class="add">＋</button>
    </form>
    <div class="addrow countrow">
      <span class="countlabel">人数から作る</span>
      <input id="memberCount" type="number" min="1" max="50" step="1" placeholder="人数">
      <button id="addCount" type="button" class="add">人を作る</button>
    </div>
    <p class="hint mini-hint">名前をタップで変更。「×割合」で傾斜（子ども0.5・幹事多めなど）を一度決めると、すべての出費に効きます。</p>
  </section>

  <nav id="tabs" class="tabs"></nav>

  <section class="panel phaseview" id="phaseview">
    <div class="phaseinfo" id="phaseinfo"></div>
    <div class="tablewrap">
      <table id="ledger" class="ledger">
        <thead><tr><th>項目</th><th>払った人</th><th class="num">金額</th></tr></thead>
        <tbody id="ledgerBody"></tbody>
        <tfoot id="ledgerFoot"></tfoot>
      </table>
    </div>
    <button id="addRow" class="add wide">＋ この段階の出費を足す</button>
  </section>

  <section class="panel result" id="settleview" hidden>
    <div class="phaseinfo" id="settleinfo"></div>
    <div id="balances" class="balances"></div>
    <div id="transfers" class="transfers"></div>
  </section>

  <div class="row foot-actions">
    <button id="share" class="pill primary">この会計を送る</button>
    <button id="clear" class="pill">まっさらにする</button>
  </div>
</main>

<!-- 行エディタ -->
<div id="editor" class="modal" hidden>
  <div class="sheet">
    <div class="sheethead"><span id="edTitle">出費</span><button id="edClose" class="x">×</button></div>
    <label class="fld">段階
      <select id="edPhase"></select>
    </label>
    <label class="fld">項目
      <input id="edItem" placeholder="例：宿・夕食・前売り" maxlength="30" autocomplete="off">
    </label>
    <div class="fldrow">
      <label class="fld">金額
        <input id="edAmount" type="number" inputmode="numeric" min="0" step="1" placeholder="0">
      </label>
      <label class="fld">払った人
        <select id="edPayer"></select>
      </label>
    </div>
    <label class="fld">メモ（誰から借りた・備考など）
      <input id="edMemo" placeholder="メモ" maxlength="60" autocomplete="off">
    </label>
    <div class="fld">
      <div class="wholabel">割る人
        <label class="wtoggle"><input type="checkbox" id="edWeighted"> この出費だけ割合を変える</label>
      </div>
      <div id="edParts" class="parts"></div>
    </div>
    <div class="fldrow receipt">
      <label class="rcpbtn">📷 領収書
        <input id="edReceipt" type="file" accept="image/*" hidden>
      </label>
      <div id="edReceiptPrev" class="rcpprev"></div>
    </div>
    <div class="sheetact">
      <button id="edDelete" class="pill danger" hidden>消す</button>
      <button id="edSave" class="pill primary">保存</button>
    </div>
  </div>
</div>

<div id="lightbox" class="lightbox" hidden><img id="lightimg" alt="領収書"></div>
<div id="toast" hidden></div>

<footer>
  お金の記録も領収書も、端末から一歩も出ません。リンクには金額だけが畳まれます（領収書は手元に残ります）。<br>
  <a href="./README.md">しくみ</a> · <a href="../../">作品集</a>
</footer>

<script type="module" src="js/ui/main.js"></script>
</body>
</html>
