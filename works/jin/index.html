<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="description" content="陣 (jin) — 種ひとつから生まれる、盤上の戦記。タッチ操作のタクティクスRPG。グリッド戦闘・命中/会心/連撃・武器相性・地形・職と技・敵AI。同じ種からは同じ戦場。依存ゼロ・オフライン。">
<meta name="theme-color" content="#0a0d14">
<title>陣 — a tactics RPG born from a seed</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stage"></canvas>

<!-- 上の帯 -->
<div id="hud" hidden>
  <div class="hudleft">
    <span id="turnInfo"></span>
    <span id="objInfo"></span>
  </div>
  <div class="hudright">
    <button id="muteBtn" class="hbtn" title="音">♪</button>
    <button id="view3dBtn" class="hbtn" title="立体表示">立体</button>
    <button id="logBtn" class="hbtn" title="履歴">履歴</button>
    <button id="autoBtn" class="hbtn" title="オート">オート</button>
    <button id="endTurn" class="hbtn primary">ターン終了</button>
  </div>
</div>

<!-- 戦いの履歴 -->
<aside id="log" hidden>
  <button id="logClose" class="x">×</button>
  <h3>戦いの記録</h3>
  <div id="logBody"></div>
</aside>

<!-- タイトル -->
<div id="title" class="overlay">
  <div class="card">
    <h1>陣 <span class="en">/ jin</span></h1>
    <p class="lead">種ひとつから生まれる、盤上の戦記。<br>同じ種からは、一マスもちがわぬ同じ戦場。</p>
    <label class="seedrow">種 <input id="seedInput" inputmode="numeric" placeholder="20260615"></label>
    <div class="btnrow">
      <button id="startBtn" class="big">出陣する</button>
      <button id="randBtn" class="ghost">種をふる</button>
      <button id="codexBtn" class="ghost">図鑑</button>
    </div>
    <div class="btnrow">
      <button id="continueBtn" class="ghost" hidden>つづきから</button>
      <button id="skirmishBtn" class="ghost">演習（一戦）</button>
      <button id="loadBtn" class="ghost">符号で読込</button>
    </div>
    <label class="optrow"><input type="checkbox" id="setpieceChk"> 手作りの設置マップで戦う（種の生成ではなく）</label>
    <label class="optrow"><input type="checkbox" id="initChk"> 行動順を速さ順にする（イニシアチブ）</label>
    <p class="fine">タップで選んで動かす。二本指で拡大、ドラッグで見回す。長押しで詳細。</p>
  </div>
</div>

<!-- 台詞 -->
<div id="dialogue" class="overlay dlg" hidden>
  <div class="dlgbox">
    <canvas id="dlgFace" class="dlgface" width="96" height="96"></canvas>
    <div class="dlgmain">
      <div id="dlgWho" class="dlgwho"></div>
      <div id="dlgText" class="dlgtext"></div>
      <div class="dlgmore">▼ タップで送る</div>
    </div>
  </div>
</div>

<!-- 会心のカットイン -->
<canvas id="cutin" width="200" height="200" hidden></canvas>

<!-- 拠点（章と章のあいだ） -->
<div id="base" class="overlay" hidden>
  <div class="card basecard">
    <h2 id="baseTitle">拠点</h2>
    <div id="baseGold" class="basegold"></div>
    <nav id="baseTabs" class="codextabs"></nav>
    <div id="baseBody" class="codexbody basebody"></div>
    <button id="baseGo" class="big">次の戦へ進む</button>
  </div>
</div>

<!-- 図鑑 -->
<div id="codex" class="overlay" hidden>
  <div class="card codexcard">
    <button id="codexClose" class="x">×</button>
    <h2>図鑑</h2>
    <nav id="codexTabs" class="codextabs"></nav>
    <div id="codexBody" class="codexbody"></div>
  </div>
</div>

<!-- 章の幕間 -->
<div id="intro" class="overlay" hidden>
  <div class="card">
    <h2 id="introTitle"></h2>
    <p id="introText" class="lead"></p>
    <div class="party" id="introParty"></div>
    <div class="btnrow">
      <button id="sortieBtn" class="big">出撃（陣を布く）</button>
      <button id="massBtn" class="ghost">会戦（自動・大ぶつかり）</button>
    </div>
  </div>
</div>

<!-- 結果 -->
<div id="result" class="overlay" hidden>
  <div class="card">
    <h2 id="resultTitle"></h2>
    <p id="resultText" class="lead"></p>
    <div class="btnrow">
      <button id="nextBtn" class="big">次へ</button>
      <button id="retryBtn" class="ghost">この章を再戦</button>
    </div>
  </div>
</div>

<!-- 行動メニュー -->
<nav id="actionMenu" hidden></nav>

<!-- 戦闘予報 -->
<aside id="forecast" hidden>
  <div id="fcBody"></div>
  <div class="btnrow">
    <button id="fcGo" class="big">攻撃</button>
    <button id="fcCancel" class="ghost">やめる</button>
  </div>
</aside>

<!-- ユニット詳細 -->
<aside id="info" hidden>
  <button id="infoClose" class="x">×</button>
  <div id="infoBody"></div>
</aside>

<div id="toast" hidden></div>

<footer id="foot">
  <a href="./README.md">しくみ</a> · <a href="../../">作品集</a>
</footer>

<script type="module" src="js/ui/main.js"></script>
</body>
</html>
