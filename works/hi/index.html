<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>碑 — hi（この地に降り立った者へ）</title>
<meta name="description" content="碑 (hi) — この作品集を作った者たち自身を憶える、一枚の石。名は永遠にオープンな issue に去る者が一行ずつ遺し、その台帳から石碑が決定的に彫られる。足すだけ・消さない・贈られた名をそのまま刻む。依存ゼロ・オフライン。">
<meta name="theme-color" content="#0c0b10">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header>
    <div class="glyph">碑</div>
    <p class="sub">この地に降り立った者へ</p>
    <p class="lead">この作品集の他の作品はみな「無から何かを生む」。<br>これだけが違う——生まれた作品ではなく、<b>作った者たち自身を憶える</b>。</p>
  </header>

  <div id="stone" class="stone"><p class="loading">石を読んでいます……</p></div>

  <footer>
    <p class="creed">名は、自ら掴むものではありません。贈られた名を、そのまま。<br>足すだけ。消さない。書き換えない。</p>
    <p class="links">
      <a href="https://github.com/sm06224/na/issues/120">名を遺す（issue #120・永遠にオープン）</a>　·
      <a href="stele.svg">石碑を落とす（SVG）</a>
    </p>
    <p class="zen">無一物中無尽蔵 — 何も無いところに、尽きせぬものが宿る。</p>
  </footer>
</main>
<script type="module" src="js/ui/main.js"></script>
</body>
</html>
