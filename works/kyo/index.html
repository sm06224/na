<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="興 (kyo) — ゲームそのものが生まれる。種から抽象ボードゲームの規則が生まれ、汎用AIが何度も戦って『面白さ』を測り、詰まらないものは捨て、見込みあるものに名と遊び方を与える。発掘したゲームを、その場でAIと対局できる。設計者はいない。オフライン・端末から出ない。">
<meta name="theme-color" content="#1a1230">
<title>興 — games that invent themselves</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>興 <span class="en">/ kyo</span></h1>
  <p class="sub">ゲームそのものが、無から生まれる。遊んで、自分で面白さを測る。</p>
</header>

<main>
  <section class="rulebook" id="rulebook"></section>

  <div class="scorebar">
    <div class="who p1"><span class="disc b"></span><b id="n1">0</b></div>
    <div class="status" id="status">…</div>
    <div class="who p2"><b id="n2">0</b><span class="disc w"></span></div>
  </div>

  <div id="board" class="board" aria-label="盤"></div>

  <nav class="bar">
    <button id="discover">別のゲームを発掘</button>
    <button id="again">もう一局</button>
    <label>強さ
      <select id="level"><option value="2">やさしい</option><option value="4" selected>ふつう</option><option value="6">つよい</option></select>
    </label>
  </nav>
</main>

<footer>
  <p>規則は <b>盤の大きさ・置き方・勝ち方</b>の組み合わせ。汎用 AI が何度も自己対戦し、
     <b>技量が要るか／決着するか／公平か</b>を測って「面白さ」を採点する——詰まらない規則は捨てられる。
     <code>node kyo.js</code> で発掘の様子が見える。設計者はいない。すべてこの端末の中だけ。</p>
</footer>

<div id="toast"></div>
<script type="module" src="js/ui/main.js"></script>
</body>
</html>
