  <h1>苔 <span class="en">/ koke</span></h1>
  <img src="garden.svg" alt="苔庭 — 毎週すこしずつ育つ">
  <p>この庭は、開いたときに動く作品ではありません。<b>時間がたつと変わる</b>作品です。<br>
     毎週月曜の朝、CI の庭師がひとりでに苔を描き足して、自分でコミットして帰ります。<br>
     庭は週番号の純粋関数なので、庭師が何週眠っても、苔は経った時間ぶん育ちます。<br>
     そして何週目かに、歳月だけが連れてくる客があります。<a href="https://github.com/sm06224/na/tree/main/works/koke">コードを読んだ人だけが</a>、それを知っています。</p>
  <footer><a href="../../">← na</a>　無 → 庭 → 生 → 史 → 番 → 言 → 歌 → 備 → 奏 → 苔</footer>
