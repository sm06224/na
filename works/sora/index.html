<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>宙 — sora（space megademo）</title>
<meta name="description" content="宙 (sora) — 無から作った宇宙のメガデモ。星空ワープ・プラズマ星雲・回る惑星・ワームホール・グリーティングが、自前のシンセ音楽に同期して流れる。音源ファイルなし・依存ゼロ・オフライン。">
<meta name="theme-color" content="#02030a">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="screen"></canvas>

<div id="overlay">
  <div class="card">
    <div class="glyph">宙</div>
    <h1>SORA</h1>
    <p class="sub">a space megademo — 無から</p>
    <button id="launch">▶ 起動</button>
    <p class="note">音が出ます。ヘッドホン推奨。<br>
    星空ワープ → プラズマ星雲 → 回る惑星 → ワームホール → グリーティング。<br>
    すべて自前——音源ファイルも、画像も、ひとつもありません。</p>
    <p class="keys">[F] 全画面 ・ [space] 停止 ・ [R] 最初から</p>
  </div>
</div>

<script type="module" src="js/ui/main.js"></script>
</body>
</html>
